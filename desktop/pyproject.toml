[project]
name = "ollie-reader-desktop"
version = "0.1.0"
description = "Ollie Reader desktop shell: PySide6 tray + local FastAPI sidecar (Piper/Kokoro TTS, PDF extraction)"
requires-python = ">=3.10"
dependencies = [
    "fastapi",
    "starlette>=1.3.1",
    "python-multipart",
    "uvicorn[standard]",
    "pymupdf",
    "piper-tts",
    "soundfile",
    "numpy",
    "kokoro>=0.9.4",
    "torch",
    "PySide6",
    # outbound HTTP client for /api/fetch-url (URL proxy, e.g. remote PDFs).
    "httpx",
    # spaCy model used by misaki/kokoro for English G2P; not on PyPI, pinned below.
    "en-core-web-sm",
]

[dependency-groups]
dev = [
    "pytest",
    "pyinstaller",
]

[tool.uv.sources]
en-core-web-sm = { url = "https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl" }

# This is a run-from-source app (main.py + server/ + shell/), not an installable
# distribution, so uv manages only the environment — it does not build the project.
[tool.uv]
package = false

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
